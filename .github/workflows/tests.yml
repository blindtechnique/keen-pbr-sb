name: Run tests

on:
  push:
    branches:
      - 'main'
      - 'dev'
      - 'dev-*'
    paths:
      - 'build_scripts/**'
      - 'cmake/**'
      - 'docker/**'
      - 'frontend/**'
      - 'extensions/transport-manager/**'
      - 'include/**'
      - 'packages/**'
      - 'src/**'
      - 'tests/**'
      - 'third_party/**'
      - 'CMakeLists.txt'
      - 'Makefile'
      - 'version.mk'
  pull_request:
  workflow_dispatch:

jobs:
  keenetic-package-validator:
    name: Keenetic package validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run IPK validator tests
        run: python3 -m unittest discover -s build_scripts/tests -p 'test_*.py' -v

  transport-manager:
    name: transport manager
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache-dependency-path: extensions/transport-manager/go.mod
      - name: Run companion tests and vet
        run: make transport-manager-test

  doctest:
    name: doctest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            pkg-config \
            libcurl4-openssl-dev \
            libnl-3-dev \
            libnl-route-3-dev \
            libunwind-dev

      - name: Run doctest
        run: make test

  firewall-it:
    name: firewall integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            pkg-config \
            libcurl4-openssl-dev \
            libnl-3-dev \
            libnl-route-3-dev \
            libunwind-dev

      - name: Run firewall integration suite
        run: make firewall-it
