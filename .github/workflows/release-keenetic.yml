name: Release Keenetic IPK

on:
  push:
    tags:
      - "v*"
    # Alpha and next produce only an aarch64 test IPK. Release tags build every
    # published architecture. Main is published only through a version tag.
    branches:
      - alpha
      - next
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to rebuild and publish (for example v3.0.7-sb.11)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        run: |
          cd frontend
          bun install --frozen-lockfile
          bun test
          bun run typecheck
          bun run build

      - name: Upload frontend bundle
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libnl-3-dev \
            libnl-route-3-dev \
            libunwind-dev \
            pkg-config \
            zlib1g-dev

      - name: Configure backend tests
        run: |
          cmake -S . -B build-ci \
            -DBUILD_TESTS=ON \
            -DWITH_API=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build backend tests
        # The cross-build job compiles the production binary with Keenetic's
        # GCC 8.4. Building only the native test target here avoids compiling
        # the same source set twice on the GitHub runner.
        run: cmake --build build-ci --target keen-pbr-tests --parallel 4

      - name: Run backend tests
        run: ./build-ci/tests/keen-pbr-tests

  build:
    needs:
      - frontend
      - transport-manager
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON((github.ref == 'refs/heads/alpha' || github.ref == 'refs/heads/next') && '[{"config":"aarch64-3.10","arch":"aarch64"}]' || '[{"config":"aarch64-3.10","arch":"aarch64"},{"config":"mips-3.4","arch":"mips"},{"config":"mipsel-3.4","arch":"mipsel"}]') }}
    env:
      KEENETIC_VERSION: "3.10"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download frontend bundle
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Stage frontend bundle
        run: |
          rm -rf frontend/dist
          mkdir -p frontend/dist
          cp -a frontend-dist/. frontend/dist/

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          # This module currently uses only the Go standard library, so there
          # is no go.sum to cache.
          cache: false

      - name: Build ${{ matrix.config }} IPK
        env:
          KEENETIC_CONFIG: ${{ matrix.config }}
        run: |
          KEEN_PBR_RELEASE_OVERRIDE="$(sed -n 's/^KEEN_PBR_RELEASE=//p' version.mk)"
          export KEEN_PBR_RELEASE_OVERRIDE
          echo "Building release $KEEN_PBR_RELEASE_OVERRIDE for $KEENETIC_CONFIG"
          make keenetic-packages \
            KEENETIC_CONFIG="$KEENETIC_CONFIG" \
            KEENETIC_VERSION="$KEENETIC_VERSION" \
            KEENETIC_BUILD_JOBS=4

      - name: Collect and validate ${{ matrix.config }} IPK
        run: |
          set -e
          IPK=$(find build/packages -name 'keen-pbr_*.ipk' | head -1)
          test -n "$IPK"
          cp "$IPK" .
          IPK_NAME=$(basename "$IPK")
          python3 build_scripts/validate-keenetic-ipk.py "$IPK_NAME" --arch "${{ matrix.arch }}"

      - name: Upload ${{ matrix.config }} IPK
        uses: actions/upload-artifact@v7
        with:
          name: keenetic-ipk-${{ matrix.config }}
          path: keen-pbr_*.ipk
          if-no-files-found: error

  transport-manager:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false

      - name: Test transport manager
        working-directory: extensions/transport-manager
        run: go test ./...

      - name: Vet transport manager
        working-directory: extensions/transport-manager
        run: go vet ./...

  publish-release:
    if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
    needs:
      - build
      - backend
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all Keenetic IPKs
        uses: actions/download-artifact@v8
        with:
          pattern: keenetic-ipk-*
          path: release-assets
          merge-multiple: true

      - name: Create checksums
        run: |
          cd release-assets
          test "$(find . -maxdepth 1 -name 'keen-pbr_*.ipk' | wc -l)" -eq 3
          sha256sum keen-pbr_*.ipk > SHA256SUMS
          cat SHA256SUMS

      - name: Extract release notes from CHANGELOG
        run: |
          TAG="${RELEASE_TAG#v}"
          awk -v ver="$TAG" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > RELEASE_BODY.md
          if ! [ -s RELEASE_BODY.md ]; then
            echo "Автоматическая сборка $RELEASE_TAG. Подробности в CHANGELOG.md." > RELEASE_BODY.md
          fi
          cat RELEASE_BODY.md

      - name: Drop stale assets from existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            for asset in $(gh release view "$RELEASE_TAG" --json assets -q '.assets[].name'); do
              echo "Removing stale asset: $asset"
              gh release delete-asset "$RELEASE_TAG" "$asset" -y || true
            done
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "keen-pbr-sb ${{ env.RELEASE_TAG }}"
          body_path: RELEASE_BODY.md
          files: |
            release-assets/keen-pbr_*.ipk
            release-assets/SHA256SUMS

  upload-next-artifact:
    if: github.ref == 'refs/heads/next'
    needs:
      - build
      - backend
    runs-on: ubuntu-latest
    steps:
      - name: Download aarch64 test IPK
        uses: actions/download-artifact@v8
        with:
          name: keenetic-ipk-aarch64-3.10
          path: release-assets

      - name: Create checksum
        run: |
          cd release-assets
          sha256sum keen-pbr_*.ipk > SHA256SUMS

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: keen-pbr-ipk
          path: |
            release-assets/keen-pbr_*.ipk
            release-assets/SHA256SUMS
          if-no-files-found: error

  upload-alpha-artifact:
    if: github.ref == 'refs/heads/alpha'
    needs:
      - build
      - backend
    runs-on: ubuntu-latest
    steps:
      - name: Download aarch64 alpha IPK
        uses: actions/download-artifact@v8
        with:
          name: keenetic-ipk-aarch64-3.10
          path: release-assets

      - name: Create checksum
        run: |
          cd release-assets
          sha256sum keen-pbr_*.ipk > SHA256SUMS

      - name: Upload alpha workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: keen-pbr-alpha-ipk
          path: |
            release-assets/keen-pbr_*.ipk
            release-assets/SHA256SUMS
          if-no-files-found: error
