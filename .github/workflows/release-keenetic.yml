name: Release Keenetic IPK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      KEENETIC_CONFIG: aarch64-3.10
      KEENETIC_VERSION: "3.10"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        run: |
          cd frontend
          bun install --frozen-lockfile
          bun run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: extensions/transport-manager/go.sum

      - name: Build IPK in entware-builder
        run: |
          # resolve-version.sh derives the release number from the last commit
          # date whenever it runs inside a git tree, which would produce
          # keen-pbr_3.0.7-20260719075511_*.ipk instead of the released
          # keen-pbr_3.0.7-5_*.ipk. Pin it to version.mk for reproducible names.
          KEEN_PBR_RELEASE_OVERRIDE="$(sed -n 's/^KEEN_PBR_RELEASE=//p' version.mk)"
          export KEEN_PBR_RELEASE_OVERRIDE
          echo "Building release $KEEN_PBR_RELEASE_OVERRIDE"
          make keenetic-packages \
            KEENETIC_CONFIG="$KEENETIC_CONFIG" \
            KEENETIC_VERSION="$KEENETIC_VERSION" \
            KEENETIC_BUILD_JOBS=4

      - name: Collect artifacts and checksums
        id: artifacts
        run: |
          set -e
          ls -R build/packages
          IPK=$(find build/packages -name 'keen-pbr_*.ipk' | head -1)
          test -n "$IPK"
          cp "$IPK" .
          IPK_NAME=$(basename "$IPK")
          sha256sum "$IPK_NAME" > SHA256SUMS
          echo "ipk=$IPK_NAME" >> "$GITHUB_OUTPUT"
          cat SHA256SUMS

      - name: Extract release notes from CHANGELOG
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk -v ver="$TAG" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > RELEASE_BODY.md
          if ! [ -s RELEASE_BODY.md ]; then
            echo "Автоматическая сборка $GITHUB_REF_NAME. Подробности в CHANGELOG.md." > RELEASE_BODY.md
          fi
          cat RELEASE_BODY.md

      - name: Drop stale assets from an existing release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # install.sh picks the first matching asset, so a re-run must not
          # leave an older IPK next to the new one (its checksum is no longer
          # in SHA256SUMS and the install would abort).
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            for asset in $(gh release view "$GITHUB_REF_NAME" --json assets -q '.assets[].name'); do
              echo "Removing stale asset: $asset"
              gh release delete-asset "$GITHUB_REF_NAME" "$asset" -y || true
            done
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "keen-pbr-sb ${{ github.ref_name }}"
          body_path: RELEASE_BODY.md
          files: |
            ${{ steps.artifacts.outputs.ipk }}
            SHA256SUMS

      - name: Upload workflow artifacts (non-tag runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: keen-pbr-ipk
          path: |
            ${{ steps.artifacts.outputs.ipk }}
            SHA256SUMS
