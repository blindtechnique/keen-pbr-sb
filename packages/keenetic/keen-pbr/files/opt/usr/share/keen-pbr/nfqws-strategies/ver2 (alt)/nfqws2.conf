# VARIANT: C/AGGRESSIVE
# Adaptive TCP/TLS, QUIC and UDP strategy with MODE_AUTO enabled.

# Provider network interface
ISP_INTERFACE="eth3"

# Startup arguments
NFQWS_BASE_ARGS="--lua-init=@/opt/etc/nfqws2/lua/zapret-lib.lua
                 --lua-init=@/opt/etc/nfqws2/lua/zapret-antidpi.lua
                 --lua-init=@/opt/etc/nfqws2/lua/zapret-auto.lua
                 --blob=quic_initial:@/opt/etc/nfqws2/blobs/quic_initial.bin
                 --blob=tls_clienthello:@/opt/etc/nfqws2/blobs/tls_clienthello.bin"

# HTTP(S), TLS and MTProto over TCP
NFQWS_ARGS="--filter-tcp=443,80,1984,2053,2083,2087,2096,5222,8443
            --filter-l7=http,tls,mtproto

            --payload=tls_client_hello,mtproto_initial
            --lua-desync=circular:fails=2:time=300:retrans=3:nld=2

            # Strategy 1: fake ClientHello + split with overlap
            --lua-desync=fake:blob=tls_clienthello:optional:tls_mod=rnd,dupsid,sni=fonts.google.com:tcp_seq=10000:strategy=1
            --lua-desync=multisplit:pos=1,midsld:seqovl=1:seqovl_pattern=tls_clienthello:tcp_ts_up:strategy=1

            # Strategy 2: fake ClientHello with bad ACK + stronger split
            --lua-desync=fake:blob=tls_clienthello:optional:tcp_ack=-66000:tls_mod=rnd,dupsid,sni=www.google.com:tcp_ts_up:repeats=2:strategy=2
            --lua-desync=multisplit:pos=1,midsld:seqovl=1:seqovl_pattern=tls_clienthello:tcp_ts_up:strategy=2

            # Strategy 3: two-stage hostfakesplit
            --lua-desync=hostfakesplit:host=ozon.ru:midhost=host-2:seqovl=sniext+3:seqovl_pattern=tls_clienthello:badsum:tcp_md5:tcp_ts_up:strategy=3
            --lua-desync=hostfakesplit:tcp_md5:tcp_ts_up:strategy=3

            # Strategy 4: reordered TLS segments with overlap
            --lua-desync=multidisorder:pos=1,midsld:seqovl=3:seqovl_pattern=tls_clienthello:tcp_ts_up:strategy=4

            # Strategy 5: adaptive low-TTL fake with a conservative fallback TTL
            --lua-desync=fake:blob=tls_clienthello:optional:tls_mod=rnd,dupsid,sni=www.microsoft.com:tcp_seq=10000:ip_ttl=5:ip_autottl=1,3-8:strategy=5
            --lua-desync=multisplit:pos=1,midsld:seqovl=1:seqovl_pattern=tls_clienthello:tcp_ts_up:strategy=5

            # Plain HTTP
            --payload=http_req
            --lua-desync=http_methodeol:badsum"

# QUIC: endpoint-safe fake first, adaptive TTL second, compatibility fallback last
NFQWS_ARGS_QUIC="--filter-udp=443
                 --filter-l7=quic
                 --payload=quic_initial
                 --lua-desync=circular:fails=2:time=300:retrans=3:nld=2
                 --lua-desync=fake:blob=quic_initial:badsum:repeats=11:strategy=1
                 --lua-desync=fake:blob=quic_initial:ip_ttl=5:ip_autottl=1,3-8:repeats=6:strategy=2
                 --lua-desync=fake:blob=quic_initial:repeats=6:strategy=3"

# UDP calls, Discord, WireGuard, MTProto and unrecognized/AWG-like traffic.
# NFQWS_ARGS_UDP intentionally does not inherit hostlists from NFQWS_EXTRA_ARGS.
NFQWS_ARGS_UDP="--filter-udp=590-600,1400,3478-3481,5349,19294-19344,49152-65535
                --filter-l7=wireguard,stun,discord,mtproto,unknown
                --out-range=<n2
                --payload=wireguard_initiation,wireguard_response,wireguard_cookie,stun,discord_ip_discovery,mtproto_initial,unknown
                --lua-desync=circular:fails=2:time=300:retrans=3:nld=2
                --lua-desync=fake:blob=quic_initial:badsum:repeats=6:strategy=1
                --lua-desync=fake:blob=quic_initial:ip_ttl=5:ip_autottl=1,3-8:repeats=6:strategy=2
                --lua-desync=fake:blob=quic_initial:repeats=6:strategy=3"

# Working modes
MODE_LIST="--hostlist=/opt/etc/nfqws2/lists/user.list"
MODE_ALL="--hostlist-exclude=/opt/etc/nfqws2/lists/exclude.list"
MODE_AUTO="$MODE_LIST --hostlist-auto=/opt/etc/nfqws2/lists/auto.list --hostlist-auto-debug=/opt/var/log/nfqws2.log $MODE_ALL"

# Keep automatic detection enabled
NFQWS_EXTRA_ARGS="$MODE_AUTO"

# IP lists
NFQWS_ARGS_IPSET="--ipset=/opt/etc/nfqws2/lists/ipset.list --ipset-exclude=/opt/etc/nfqws2/lists/ipset_exclude.list"

# Keep empty: custom profiles are inserted before the main profiles and can shadow them
NFQWS_ARGS_CUSTOM=""

# IPv6 support
IPV6_ENABLED=0

# Firewall interception ports
TCP_PORTS=80,443,1984,2053,2083,2087,2096,5222,8443
UDP_PORTS=443,590:600,1400,3478:3481,5349,19294:19344,49152:65535

# Keenetic policy
POLICY_NAME="nfqws"
POLICY_EXCLUDE=0

# Logging
LOG_LEVEL=0
LOG_DEBUG_PATH="@/opt/var/log/nfqws2-debug.log"

NFQUEUE_NUM=300
USER=nobody
CONFIG_VERSION=1
